version: '3.8'

services:
  # 1. 数据库
  db:
    image: postgres:16-alpine # 官方镜像 alpine 版本体积更小
    container_name: tracker-db
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data # 数据持久化，容器删了数据还在
      - ./db/migrations/001_init_schema.sql:/docker-entrypoint-initdb.d/01_init.sql # 挂载建表语句
      - ./db/seeds/001_demo_data.sql:/docker-entrypoint-initdb.d/02_seed.sql # 挂载演示数据
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      - tracker-network

  # 后端
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: tracker-backend-run
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}

    networks:
      - tracker-network

  # 前端
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: tracker-frontend-run
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/docker-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - tracker-network

# 定义“电话线”（网络）
networks:
  tracker-network:
    driver: bridge

# 定义“硬盘” （卷）
volumes:
  postgres_data:
