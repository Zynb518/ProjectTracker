server {
    listen 80;
    server_name _;

    # 安全响应头配置
    # 1. 防御点击劫持 (Clickjacking)：限制仅允许同源 (SAMEORIGIN) 页面以 iframe 形式嵌套本系统，防止点击操作被恶意诱导
    add_header X-Frame-Options "SAMEORIGIN" always;

    # 2. 防御 MIME 类型嗅探攻击 (MIME-Sniffing)：强制浏览器必须遵守服务器声明的 Content-Type，禁止强行执行 JPG/PNG 等非脚本文件内的 HTML/JS 代码
    add_header X-Content-Type-Options "nosniff" always;

    # 3. 启用并配置浏览器内置的 XSS 过滤防护：一旦检测到跨站脚本注入攻击，直接阻断整个页面的渲染与加载 (mode=block)
    add_header X-XSS-Protection "1; mode=block" always;

    # 4. Referrer 隐私泄露防护：跨域请求时仅发送源信息 (origin) 而非完整请求路径，保护包含敏感参数的页面路由不随跳转外泄
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 5. 内容安全策略 (CSP)：限制前端资源的来源与执行白名单。仅允许加载同源资源，有效防御非受控的外部脚本注入及未经授权的 API 请求
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self';" always;

    # 1. 对应容器内部路径
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        # 2. 对应 docker-compose 里的服务名
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
